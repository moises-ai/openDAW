# .github/workflows/deploy.yml
name: Deploy openDAW studio

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: ⬇️ Checkout main repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🦄 Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 🦀 Install Rust + wasm target + binaryen
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          . "$HOME/.cargo/env"
          rustup target add wasm32-unknown-unknown
          rustup toolchain install nightly --profile minimal --component rust-src
          rustup target add wasm32-unknown-unknown --toolchain nightly
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          sudo apt-get update && sudo apt-get install -y binaryen

      - name: 📦 Install dependencies
        run: npm ci

      - name: ⭐ Fetch sponsors via GraphQL
        env:
          GH_TOKEN: ${{ secrets.SPONSORS_TOKEN }}
        run: node scripts/fetch-sponsors.mjs

      - name: 🏗️ Build project
        shell: bash
        env:
          CI: true
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          npm run build

      - name: 🚚 Run deploy script
        env:
          TERM: xterm-256color
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          npx ts-node --transpile-only deploy/run.ts