# .github/workflows/deploy-wasm.yml
name: Deploy WASM test app

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v5

      - name: 🦄 Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 🦀 Install Rust + wasm target + binaryen
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          . "$HOME/.cargo/env"
          rustup target add wasm32-unknown-unknown
          rustup toolchain install nightly --profile minimal --component rust-src
          rustup target add wasm32-unknown-unknown --toolchain nightly
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          sudo apt-get update && sudo apt-get install -y binaryen

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build wasm app
        run: npx turbo run build --filter=@opendaw/app-wasm

      - name: 🚚 Deploy to wasm.opendaw.studio
        env:
          SFTP_WASM_HOST: ${{ secrets.SFTP_WASM_HOST }}
          SFTP_WASM_PORT: ${{ secrets.SFTP_WASM_PORT }}
          SFTP_WASM_USERNAME: ${{ secrets.SFTP_WASM_USERNAME }}
          SFTP_WASM_PASSWORD: ${{ secrets.SFTP_WASM_PASSWORD }}
        run: npx ts-node --transpile-only deploy/wasm.ts
