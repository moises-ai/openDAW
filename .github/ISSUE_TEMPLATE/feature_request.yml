name: Feature request
description: Suggest an idea or improvement for openDAW
labels: ["feature request"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please describe what you would like and why.
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: The problem or workflow this would improve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should openDAW do? Sketches or examples are welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
    validations:
      required: false
